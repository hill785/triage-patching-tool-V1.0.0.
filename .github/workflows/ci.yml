name: Monorepo Pipeline Verification
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  verify-workspace:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.10.0'
      - uses: pnpm/action-setup@v3
        with:
          version: 9.0.0
      - name: Hydrate Dependencies
        run: pnpm install --frozen-lockfile
      - name: Security Isolation Environment Inject
        run: |
          echo "VITEENCRYPTIONMODE=${{ secrets.PROD_ENCRYPTION_MODE || 'post-quantum' }}" >> apps/web/.env
          echo "VITEMINTPROOFDAOSEALID=${{ secrets.PROD_DAOSEAL_ID || '436352437' }}" >> apps/web/.env
          echo "VITEGOVERNANCEWALLET_ADDRESS=${{ secrets.PROD_WALLET_ADDRESS || 'placeholderforlocalwallet' }}" >> apps/web/.env
      - name: Validate Code Verification
        run: pnpm lint
      - name: Run Production Bundle
        run: pnpm build
